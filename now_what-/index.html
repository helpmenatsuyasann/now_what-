<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MALPACA-OS Run</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background-color: #000000; overflow: hidden; touch-action: none; }
        #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        #crt-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(transparent 0px, transparent 2px, rgba(0, 0, 0, 0.25) 2px, rgba(0, 0, 0, 0.25) 4px); pointer-events: none; z-index: 999; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="crt-overlay"></div>
    <script>
        const GAME_WIDTH = window.innerWidth;
        const GAME_HEIGHT = window.innerHeight;
        
        const GRAVITY = 4500;                    
        const JUMP_VELOCITY = -1350;             
        const INITIAL_TRAVEL_TIME = 3500;
        const MIN_TRAVEL_TIME = 1200;
        const SPEED_UP_RATE = 30;
        const ALPACA_X_RATIO = 0.25;             
        const FLOOR_Y_RATIO = 0.68;              
        
        const PLATFORM_LOW_Y = 120;  
        const PLATFORM_HIGH_Y = 220; 

        const ALPACA_FONT_SIZE = 10;             
        const OBSTACLE_FONT_SIZE = 22;           
        const HITBOX_SCALE_X = 0.6;              
        const HITBOX_SCALE_Y = 0.8;              

        const COLOR_MAIN = '#00ff41';
        const COLOR_DIM = '#00aa29';
        const FONT_FAMILY = "'Courier New', Courier, monospace";

        const TEXT_STYLE = { fontFamily: FONT_FAMILY, color: COLOR_MAIN, shadow: { offsetX: 0, offsetY: 0, color: COLOR_MAIN, blur: 5, fill: true } };

        // ASCII 羊駝雙幀動畫
        const ALPACA_FRAME_A = [
            "        ∩∩",
            "      （-ω-）",
            "       │  │",
            "       │  │",
            "○┌─────┘  │",
            " ヽ       丿",
            "   \\ \\  \\ \\",
            "   ^^    ^^",
            " "
        ].join('\n');

        const ALPACA_FRAME_B = [
            "        ∩∩",
            "      （-ω-）",
            "       │  │",
            "       │  │",
            "○┌─────┘  │",
            " ヽ       丿",
            "   / /  / /",
            "   ^^    ^^",
            " "
        ].join('\n');
        const ALPACA_JUMP_FRAME = [
            "        ∩∩",
            "      （>w<）",
            "       │  │",
            "   /'\\ │  │",
            "○┌'    ┘  │",
            " ヽ       丿",
            "   \\ /  \\ /",
            "   ^^    ^^",
            " "
        ].join('\n');
        const CLOUD_ARR = 
        ["::::::::::::::::,--.::::::::::::::::::::::::::::::::::::....::", 
         ":::::::::::::(''   ):::::::::::::::::::::::::::::::::::..:::::", 
         ":::::::::(--''     _'-. _:::::::::::::::::::::::::::::::..::::", 
         "::::_.-(        (    ) ),--.:::::::::'':::::::::::::::.:::...:", 
         ".--,(()                  )-._::::::::::::::::::::::::::,--.:::", 
         " (___________________________)::::::::::::::::::::__(''.   )-:", 
         ":::::::::::::::::::::::::::::::::::::::::::....::(.__________)", 
         "::::::::::::::::::::::::::::::::::::::::::::::::::::::''::::::"];
        const SUN_STR = ["  ,--.  ", " (    ) ", "  `--'  "].join('\n');
        const STATIC_ARR = ["!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!:!", "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!", "|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|!|", "|||||||||||||||||||||||||||||||||||||||||||||||||||", "I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I|I", "IIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIII"];
        const repeatLines = (arr, times) => arr.map(line => line.repeat(times)).join('\n');

        const SFX = {
            ctx: null,
            init: function() { if (!this.ctx) { const AC = window.AudioContext || window.webkitAudioContext; this.ctx = new AC(); } if (this.ctx.state === 'suspended') this.ctx.resume(); },
            playJump: function() { if (!this.ctx) return; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(523, this.ctx.currentTime); gain.gain.setValueAtTime(0.3, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08); osc.start(); osc.stop(this.ctx.currentTime + 0.08); },
            playDeath: function() { if (!this.ctx) return; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.4); gain.gain.setValueAtTime(0.5, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4); osc.start(); osc.stop(this.ctx.currentTime + 0.4); }
        };

        class BootScene extends Phaser.Scene { constructor() { super('BootScene'); } 
            preload() {
                const timestamp = new Date().getTime(); 
                this.load.audio('music', 'assets/music.mp3');
                this.load.json('beatmap', `assets/beatmap.json?v=${timestamp}`); 
                this.load.image('bg', `assets/bg.png?v=${timestamp}`);
            }
            create() { this.scene.start('TutorialScene'); }
        }

        class TutorialScene extends Phaser.Scene {
            constructor() {
                super('TutorialScene');
            }

            create() {
                const width = GAME_WIDTH;
                const height = GAME_HEIGHT;
                const panelWidth = width / 3;
                
                const centerY = height * 0.45;
                const floorY = centerY + 40;

                const titleStyle = { fontFamily: FONT_FAMILY, color: COLOR_MAIN, fontSize: '18px', align: 'center', shadow: { offsetX: 0, offsetY: 0, color: COLOR_MAIN, blur: 5, fill: true } };
                // 字體提亮，加入一點光暈
                const descStyle = { fontFamily: FONT_FAMILY, color: COLOR_MAIN, fontSize: '14px', align: 'center', shadow: { offsetX: 0, offsetY: 0, color: COLOR_MAIN, blur: 3, fill: true } };
                
                this.add.text(width / 2, height * 0.15, "> SYSTEM TUTORIAL", titleStyle).setOrigin(0.5);

                const graphics = this.add.graphics();
                graphics.lineStyle(1, 0x00aa29, 0.4);
                graphics.beginPath();
                graphics.moveTo(panelWidth, height * 0.3);
                graphics.lineTo(panelWidth, height * 0.7);
                graphics.moveTo(panelWidth * 2, height * 0.3);
                graphics.lineTo(panelWidth * 2, height * 0.7);
                graphics.strokePath();

                // ==========================================
                // 左格：原地跳躍 (Panel 1)
                // ==========================================
                const p1X = panelWidth * 0.5;
                this.add.text(p1X, floorY, "==========", titleStyle).setOrigin(0.5, 0);
                this.add.text(p1X, floorY + 50, "TAP TO JUMP", descStyle).setOrigin(0.5, 0);
                
                const alpaca1 = this.add.text(p1X, floorY, ALPACA_FRAME_A, { ...TEXT_STYLE, fontSize: '8px' }).setOrigin(0.5, 1);

                const animatePanel1 = () => {
                    if (!alpaca1.scene) return; // 場景切換防呆
                    alpaca1.setY(floorY).setText(ALPACA_FRAME_A);
                    
                    this.time.delayedCall(500, () => {
                        if (!alpaca1.scene) return;
                        alpaca1.setText(ALPACA_JUMP_FRAME);
                        this.tweens.add({
                            targets: alpaca1,
                            y: floorY - 45,
                            duration: 250,
                            yoyo: true,
                            ease: 'Quad.easeOut',
                            onComplete: () => {
                                alpaca1.setText(ALPACA_FRAME_A);
                                this.time.delayedCall(300, animatePanel1); 
                            }
                        });
                    });
                };
                animatePanel1();

                // ==========================================
                // 中格：平台下沉 (Panel 2)
                // ==========================================
                const p2X = panelWidth * 1.5;
                this.add.text(p2X, floorY + 50, "PLATFORM SINKS", descStyle).setOrigin(0.5, 0);
                
                const platform2 = this.add.text(p2X, floorY - 20, "[════]", titleStyle).setOrigin(0.5, 0);
                const alpaca2 = this.add.text(p2X, floorY - 20, ALPACA_FRAME_A, { ...TEXT_STYLE, fontSize: '8px' }).setOrigin(0.5, 1);

                const animatePanel2 = () => {
                    if (!alpaca2.scene) return; // 場景切換防呆
                    platform2.setY(floorY - 20);
                    alpaca2.setY(floorY - 20).setText(ALPACA_FRAME_A);
                    
                    this.time.delayedCall(400, () => {
                        if (!alpaca2.scene) return;
                        this.tweens.add({
                            targets: [alpaca2, platform2],
                            y: '+=45', 
                            duration: 1000,
                            ease: 'Sine.easeInOut',
                            onComplete: () => {
                                this.time.delayedCall(200, animatePanel2); 
                            }
                        });
                    });
                };
                animatePanel2();

                // ==========================================
                // 右格：尖刺死亡 (Panel 3)
                // ==========================================
                const p3X = panelWidth * 2.5;
                this.add.text(p3X, floorY, "==========", titleStyle).setOrigin(0.5, 0);
                this.add.text(p3X, floorY + 50, "AVOID SPIKES", descStyle).setOrigin(0.5, 0);
                
                const alpaca3 = this.add.text(p3X - 10, floorY, ALPACA_FRAME_A, { ...TEXT_STYLE, fontSize: '8px' }).setOrigin(0.5, 1);
                const spike3 = this.add.text(p3X + 50, floorY, "/\\", titleStyle).setOrigin(0.5, 1);

                const animatePanel3 = () => {
                    if (!alpaca3.scene) return; // 場景切換防呆
                    alpaca3.setColor(COLOR_MAIN).setText(ALPACA_FRAME_A);
                    spike3.setX(p3X + 50);

                    this.time.delayedCall(200, () => {
                        if (!alpaca3.scene) return;
                        this.tweens.add({
                            targets: spike3,
                            x: p3X - 5, 
                            duration: 600,
                            onComplete: () => {
                                alpaca3.setColor('#ff0000');
                                this.time.delayedCall(800, animatePanel3); 
                            }
                        });
                    });
                };
                animatePanel3();

                // ==========================================
                // 底部 UI 與點擊跳轉
                // ==========================================
                const tapText = this.add.text(width / 2, height * 0.85, "> TAP TO START", { ...TEXT_STYLE, fontSize: '24px' }).setOrigin(0.5);
                this.tweens.add({ 
                    targets: tapText, 
                    alpha: 0.4, 
                    duration: 300,      // 文字淡出需 1 秒
                    hold: 500,           // 【新增】文字全亮時，多停留 0.5 秒再開始淡出
                    repeat: -1, 
                    yoyo: true,          // 回來時也需要 1 秒淡入
                    ease: 'Power1' 
                });

                this.input.once('pointerdown', () => {
                    SFX.init(); // <--- 最關鍵這行：解鎖音訊引擎
                    this.scene.start('GameScene'); // 直接進入遊戲
                });
            }
        }

        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }
            create() {
                this.beatmapData = this.cache.json.get('beatmap') || {};
                this.beats = this.beatmapData.beats || [];
                this.currentBeatIndex = 0;
                this.score = 0;
                this.isGameOver = false;
                this.currentTravelTime = INITIAL_TRAVEL_TIME;

                this.add.image(GAME_WIDTH / 2, GAME_HEIGHT / 2, 'bg').setOrigin(0.5).setDisplaySize(GAME_WIDTH, GAME_HEIGHT).setDepth(-1);
                
                //this.debugText = this.add.text(10, GAME_HEIGHT - 30, "TIME: 0", { ...TEXT_STYLE, fontSize: '12px' }).setDepth(100);

                const floorY = GAME_HEIGHT * FLOOR_Y_RATIO;
                const screenTopY = GAME_HEIGHT * 0.15;
                const bgTextStyle = { fontFamily: FONT_FAMILY, color: COLOR_DIM, fontSize: '16px', lineSpacing: 0, shadow: { offsetX: 0, offsetY: 0, color: COLOR_DIM, blur: 4, fill: true } };
                
                this.bgSun = this.add.text(GAME_WIDTH - 120, screenTopY + 30, SUN_STR, bgTextStyle).setOrigin(0, 0).setDepth(0);
                this.bgCloud1 = this.add.text(0, screenTopY, repeatLines(CLOUD_ARR, 4), bgTextStyle).setOrigin(0, 0).setAlpha(0.8).setDepth(0);
                this.bgCloud2 = this.add.text(this.bgCloud1.width, screenTopY, repeatLines(CLOUD_ARR, 4), bgTextStyle).setOrigin(0, 0).setAlpha(0.8).setDepth(0);
                this.bgStatic = this.add.text(0, floorY - 15, repeatLines(STATIC_ARR, 4), bgTextStyle).setOrigin(0, 0).setAlpha(0.4).setDepth(0);

                const uiY = screenTopY + 10;
                this.add.text(10, uiY, "MALPACA-OS", { ...TEXT_STYLE, fontSize: '18px' }).setDepth(10);
                this.scoreText = this.add.text(GAME_WIDTH - 10, uiY, "SCORE: 000000", { ...TEXT_STYLE, fontSize: '18px' }).setOrigin(1, 0).setDepth(10);

                this.floorGraphics = this.add.graphics().setDepth(4);
                this.floorVisual = this.add.text(0, floorY - 20, "", { ...TEXT_STYLE, fontSize: '20px' }).setDepth(4);

                this.floor = this.add.rectangle(GAME_WIDTH / 2, floorY + 10, GAME_WIDTH * 2, 20, 0x000000, 0);
                this.physics.add.existing(this.floor, true); 

                this.alpaca = this.add.text(GAME_WIDTH * ALPACA_X_RATIO, floorY, ALPACA_FRAME_A, { ...TEXT_STYLE, fontSize: `${ALPACA_FONT_SIZE}px`, padding: { bottom: 10 } }).setOrigin(0, 1).setDepth(6);
                this.physics.add.existing(this.alpaca);
                this.alpaca.body.setGravityY(GRAVITY);
                this.alpaca.body.setSize(this.alpaca.width * HITBOX_SCALE_X, this.alpaca.height * HITBOX_SCALE_Y);
                this.alpaca.body.setOffset((this.alpaca.width - this.alpaca.width * HITBOX_SCALE_X) / 2, this.alpaca.height - this.alpaca.height * HITBOX_SCALE_Y);
                this.physics.add.collider(this.alpaca, this.floor);

                this.obstacles = this.physics.add.group();
                this.platforms = this.physics.add.group();
                this.physics.add.overlap(this.alpaca, this.obstacles, this.hitObstacle, null, this);
                this.physics.add.collider(this.alpaca, this.platforms);

                this.input.on('pointerdown', this.jump, this);
                this.music = this.sound.add('music');
                
                this.AUDIO_DELAY = 1.5; 
                this.gameTimeSec = 0;   
                this.musicStarted = false;

                // 虛擬前置量系統與勝利判定
                this.time.delayedCall(this.AUDIO_DELAY * 1000, () => {
                    this.music.play();
                    this.musicStarted = true;

                    // 在 GameScene 的 create 裡面
                this.music.once('complete', () => {
                    if (!this.isGameOver) {
                        // --- 在結束前 0.5 秒生成獎盃 ---
                        this.spawnTrophy();
                        
                        // 延遲一點點讓玩家看到獎盃再進勝利畫面
                        this.time.delayedCall(1500, () => {
                            this.isGameOver = true;
                            this.physics.pause();
                            this.scene.launch('GameWinScene', { score: this.score });
                        });
                    }
                });
                });
            }

            jump() { if (this.isGameOver) return; if (this.alpaca.body.touching.down) { this.alpaca.body.setVelocityY(JUMP_VELOCITY); SFX.playJump(); } }

            spawnObject(type) {
                if (this.isGameOver) return;
                let targetY = GAME_HEIGHT * FLOOR_Y_RATIO, text = "", isPlatform = false;
                if (type === "spike") { text = "/\\"; } 
                else if (type === "platform_low") { text = "[══════]"; targetY -= PLATFORM_LOW_Y; isPlatform = true; }
                else if (type === "platform_high") { text = "[══════]"; targetY -= PLATFORM_HIGH_Y; isPlatform = true; }
                
                const obj = this.add.text(GAME_WIDTH + 50, targetY, text, { ...TEXT_STYLE, fontSize: `${OBSTACLE_FONT_SIZE}px` }).setOrigin(0, 1).setDepth(6);
                
                this.physics.add.existing(obj); 
                obj.body.setAllowGravity(false);
                
                if (isPlatform) { 
                    obj.body.setImmovable(true); 
                    obj.body.checkCollision.down = false; 
                    this.platforms.add(obj); 
                } else { 
                    this.obstacles.add(obj); 
                }

                this.tweens.add({ 
                    targets: obj, 
                    x: -200, 
                    duration: this.currentTravelTime, 
                    ease: 'Linear', 
                    onUpdate: () => { if (obj.body) obj.body.updateFromGameObject(); }, 
                    onComplete: () => { obj.destroy(); } 
                });
            }
            spawnTrophy() {
                const trophyY = GAME_HEIGHT * FLOOR_Y_RATIO;
                // 在最右側生成獎盃，因為它是最後一刻出現，不用特別加上物理 collision
                const trophy = this.add.text(GAME_WIDTH + 100, trophyY - 50, "🏆", { 
                    fontSize: '40px' 
                }).setOrigin(0.5, 1).setDepth(7);

                // 讓獎盃有個帥氣的滑入與彈跳效果
                this.tweens.add({
                    targets: trophy,
                    x: GAME_WIDTH * 0.75, // 滑到畫面 75% 的位置
                    duration: 1000,
                    ease: 'Back.easeOut', // 彈跳效果
                    yoyo: false
                });
            }
            hitObstacle() { if (this.isGameOver) return; this.isGameOver = true; this.music.pause(); SFX.playDeath(); this.physics.pause(); this.alpaca.setColor('#ff0000'); this.time.delayedCall(500, () => this.scene.launch('GameOverScene', { score: this.score })); }

           update(time, delta) {
                if (this.isGameOver) return;

                this.gameTimeSec += delta / 1000;
                let currentAudioTime = this.gameTimeSec - this.AUDIO_DELAY;
                
                if (this.musicStarted) {
                    currentAudioTime = this.music.seek; 
                }

                const currentFloorY = GAME_HEIGHT * FLOOR_Y_RATIO;
                this.floorGraphics.clear();
                this.floorGraphics.lineStyle(2, 0x00ff41, 1);
                this.floorGraphics.beginPath();

                let floorText = "";
                const charsCount = 50; 
                const charWidth = GAME_WIDTH / charsCount;
                let isDrawingLine = false;
                let isOverPit = false;

                for (let i = 0; i < charsCount; i++) {
                    const segmentX = i * charWidth;
                    let isHole = false;

                    this.platforms.getChildren().forEach(platform => {
                        if (segmentX + charWidth > platform.x + 10 && segmentX < platform.x + platform.width - 10) {
                            isHole = true;
                        }
                        if (this.alpaca.body.right > platform.x + 25 && this.alpaca.body.x < platform.x + platform.width - 40) {
                            isOverPit = true;
                        }
                    });

                    if (isHole) {
                        floorText += " "; 
                        isDrawingLine = false;
                    } else {
                        floorText += "·"; 
                        if (!isDrawingLine) {
                            this.floorGraphics.moveTo(segmentX, currentFloorY);
                            isDrawingLine = true;
                        }
                        this.floorGraphics.lineTo(segmentX + charWidth, currentFloorY);
                    }
                }
                
                this.floorGraphics.strokePath();
                this.floorVisual.setText(floorText);

                if (isOverPit) {
                    this.floor.body.checkCollision.up = false; 
                } else {
                    this.floor.body.checkCollision.up = true;  
                }

                if (this.alpaca.y > GAME_HEIGHT + 50 && !this.isGameOver) {
                    this.hitObstacle();
                }

                if (!this.alpaca.body.touching.down) {
                    this.alpaca.setText(ALPACA_JUMP_FRAME);
                } else {
                    const frameIndex = Math.floor(time / 200) % 2;
                    this.alpaca.setText(frameIndex === 0 ? ALPACA_FRAME_A : ALPACA_FRAME_B);
                }

                this.score += 20; 
                this.scoreText.setText(`SCORE: ${String(this.score).padStart(6, '0')}`);
                this.alpaca.setX(GAME_WIDTH * ALPACA_X_RATIO); 
                this.alpaca.body.setVelocityX(0);

                if (this.currentTravelTime > MIN_TRAVEL_TIME) {
                    this.currentTravelTime -= SPEED_UP_RATE * (delta / 1000);
                }
                const cloudSpeed = ((GAME_WIDTH + 250) / (this.currentTravelTime / 1000)) * 0.2;
                this.bgCloud1.x -= cloudSpeed * (delta / 1000); 
                this.bgCloud2.x -= cloudSpeed * (delta / 1000);
                if (this.bgCloud1.x + this.bgCloud1.width < 0) this.bgCloud1.x = this.bgCloud2.x + this.bgCloud2.width;
                if (this.bgCloud2.x + this.bgCloud2.width < 0) this.bgCloud2.x = this.bgCloud1.x + this.bgCloud1.width;

                if (this.currentBeatIndex < this.beats.length) {
                    const beat = this.beats[this.currentBeatIndex];
                    const totalDist = GAME_WIDTH + 250; 
                    const hitDist = (GAME_WIDTH + 50) - (GAME_WIDTH * ALPACA_X_RATIO); 
                    const travelTimeSec = (hitDist / totalDist) * (this.currentTravelTime / 1000);

                    if (currentAudioTime >= beat.time - travelTimeSec) {
                        this.spawnObject(beat.type);
                        this.currentBeatIndex++;
                    }
                }

                /*if (this.debugText) {
                    const nextTime = this.beats[this.currentBeatIndex] ? this.beats[this.currentBeatIndex].time : 999;
                    this.debugText.setText(`AUDIO TIME: ${currentAudioTime.toFixed(2)} | NEXT BEAT: ${nextTime.toFixed(2)}`);
                }*/
            }
        }

        class GameOverScene extends Phaser.Scene { 
            constructor() { super('GameOverScene'); } 
            init(data) { this.finalScore = data.score; } 
            create() { 
                this.add.rectangle(0, 0, GAME_WIDTH, GAME_HEIGHT, 0x000000, 0.85).setOrigin(0).setDepth(20); 
                const goText = `> FATAL ERROR\n\n  07.11 NOW...WHAT?\n\n LIVE AT THE WALL\n\n SCORE: ${String(this.finalScore).padStart(6, '0')}`; 
                this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.4, goText, { ...TEXT_STYLE, fontSize: '24px', align: 'center', lineSpacing: 10 }).setOrigin(0.5).setDepth(21); 
                const tapText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.65, "> TAP TO RESTART", { ...TEXT_STYLE, fontSize: '22px' }).setOrigin(0.5).setDepth(21); 
                
                this.input.once('pointerdown', () => { 
                    const gs = this.scene.get('GameScene'); 
                    gs.music.stop(); 
                    this.scene.stop('GameScene'); 
                    this.scene.start('TutorialScene'); // 死掉後回到 Tutorial
                }); 
            } 
        }
        
        class GameWinScene extends Phaser.Scene { 
            constructor() { super('GameWinScene'); } 
            init(data) { this.finalScore = data.score; } 
            create() { 
                this.add.rectangle(0, 0, GAME_WIDTH, GAME_HEIGHT, 0x000000, 0.85).setOrigin(0).setDepth(20); 
                const winText = `> MISSION ACCOMPLISHED\n\n  07.11 NOW...WHAT?\n\n  LIVE AT THE WALL\n\nSCORE: ${String(999999).padStart(6, '0')}`; 
                this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.4, winText, { ...TEXT_STYLE, fontSize: '24px', align: 'center', lineSpacing: 10 }).setOrigin(0.5).setDepth(21); 
                const tapText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.65, "> TAP TO CONTINUE", { ...TEXT_STYLE, fontSize: '22px' }).setOrigin(0.5).setDepth(21); 
                
                this.input.once('pointerdown', () => { 
                    const gs = this.scene.get('GameScene'); 
                    if(gs.music) gs.music.stop(); 
                    this.scene.stop('GameScene'); 
                    this.scene.start('TutorialScene'); // 贏了也回到 Tutorial
                }); 
            } 
        }
        
        // 把 StartScene 完全從這裡移除了，不會再找錯場景
        const config = { 
            type: Phaser.AUTO, parent: 'game-container', width: GAME_WIDTH, height: GAME_HEIGHT, backgroundColor: '#000000', scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, physics: { default: 'arcade', arcade: { debug: false } }, 
            scene: [BootScene, TutorialScene, GameScene, GameOverScene, GameWinScene] 
        }; 
        const game = new Phaser.Game(config);
    </script>
</body>
